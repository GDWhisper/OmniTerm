<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#863bFF"/>
      <stop offset="100%" stop-color="#47bFFF"/>
    </linearGradient>
  </defs>
  <!-- Terminal window - fills entire canvas -->
  <rect x="1" y="1" width="46" height="46" rx="8" fill="url(#g)"/>
  <!-- Title bar dot - top right -->
  <circle cx="38" cy="10" r="3" fill="#fff" opacity="0.85"/>
  <!-- Prompt arrow > - bigger and bolder -->
  <path d="M11 20 L21 27 L11 34" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cursor block _ -->
