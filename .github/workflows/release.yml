name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  # ── Build Frontend ──────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --no-frozen-lockfile
        working-directory: frontend
      - run: pnpm build
        working-directory: frontend

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Build Backend (matrix) ──────────────────────────────────────
  backend:
    needs: frontend
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            platform: macos-aarch64
            target: aarch64-apple-darwin
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Get binary name
        id: bin
        shell: bash
        run: |
          BIN=$(cargo metadata --format-version=1 --no-deps | \
                jq -r '.packages[0].targets[] | select(.kind[0]=="bin") | .name')
          echo "name=$BIN" >> "$GITHUB_OUTPUT"

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp "target/${{ matrix.target }}/release/${{ steps.bin.outputs.name }}" \
             "omniterm-${{ matrix.platform }}"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "target/${{ matrix.target }}/release/${{ steps.bin.outputs.name }}.exe"
          Compress-Archive -Path $src -DestinationPath "omniterm-${{ matrix.platform }}.zip"

      - uses: actions/upload-artifact@v4
        if: runner.os != 'Windows'
        with:
          name: omniterm-${{ matrix.platform }}
          path: omniterm-${{ matrix.platform }}

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: omniterm-${{ matrix.platform }}
          path: omniterm-${{ matrix.platform }}.zip

  # ── GitHub Release ─────────────────────────────────────────────
  github-release:
    needs: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: omniterm-*
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            omniterm-*/omniterm-*
            install.sh
            install.ps1
          generate_release_notes: true

  # ── Docker Publish ──────────────────────────────────────────────
  docker:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist/

      - uses: actions/download-artifact@v4
        with:
          name: omniterm-linux-x86_64
          path: .

      - run: chmod +x omniterm-linux-x86_64

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
